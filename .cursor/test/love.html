<!DOCTYPE html>
<html lang=\"zh-CN\">
<head>
  <meta charset=\"UTF-8\">
  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
  <title>I love you</title>
  <style>
    :root {
      --bg: linear-gradient(135deg, #eef4ff, #f7fbff);
      --card: #ffffff;
      --accent: #ff4d6d;
      --soft: #94b7ff;
      --text: #2f3b52;
      --shadow: 0 12px 30px rgba(0,0,0,0.08);
      --border: #dfe7f3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: \"Segoe UI\", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }
    .shell {
      width: min(1100px, 100%);
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      align-items: start;
    }
    .hero {
      grid-column: 1 / -1;
      text-align: center;
    }
    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(32px, 6vw, 46px);
      letter-spacing: 1px;
    }
    .hero p {
      margin: 0;
      opacity: 0.8;
    }
    .heart-wrap {
      position: relative;
      display: grid;
      place-items: center;
      height: 320px;
    }
    .heart-btn {
      position: relative;
      width: 160px;
      height: 140px;
      border: none;
      background: transparent;
      cursor: pointer;
      outline: none;
      transform: translateY(0);
      transition: transform 220ms ease;
    }
    .heart {
      position: absolute;
      inset: 0;
      margin: auto;
      width: 140px;
      height: 125px;
      background: var(--accent);
      transform: rotate(-45deg);
      border-radius: 16px;
      animation: heartbeat 1.6s ease-in-out infinite;
      box-shadow: 0 20px 40px rgba(255, 77, 109, 0.28);
    }
    .heart::before,
    .heart::after {
      content: \"\";
      position: absolute;
      width: 140px;
      height: 125px;
      background: var(--accent);
      border-radius: 50%;
    }
    .heart::before { top: -70px; left: 0; }
    .heart::after { top: 0; left: 70px; }
    .heart.active {
      animation: heartbeat-strong 0.9s ease-in-out 1,
                 jitter 0.18s ease-in-out 5;
      box-shadow: 0 24px 48px rgba(255, 77, 109, 0.35);
    }
    .status {
      margin-top: 14px;
      text-align: center;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.5px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 18px 16px;
      box-shadow: var(--shadow);
    }
    .card h3 {
      margin: 0 0 10px;
      font-size: 18px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .day {
      padding: 12px 0;
      text-align: center;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.75);
      font-weight: 600;
      color: #4a5568;
    }
    .day:nth-child(7n) { border-right: none; }
    .day:nth-last-child(-n+7) { border-bottom: none; }
    .day.special { background: #ffe8ef; color: var(--accent); }
    form {
      display: grid;
      gap: 10px;
    }
    input, textarea, button {
      font: inherit;
    }
    input, textarea {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      background: #f9fbff;
      transition: border-color 140ms ease, box-shadow 140ms ease;
    }
    input:focus, textarea:focus {
      border-color: var(--soft);
      box-shadow: 0 0 0 3px rgba(148, 183, 255, 0.25);
      outline: none;
    }
    textarea { min-height: 90px; resize: vertical; }
    .btn {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(120deg, #ff7aa2, #ff4d6d);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(255, 77, 109, 0.28);
      transition: transform 120ms ease, box-shadow 120ms ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); box-shadow: 0 8px 18px rgba(255, 77, 109, 0.28); }
    .toast {
      display: none;
      margin-top: 6px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #e9f2ff;
      border: 1px solid var(--soft);
      color: #2f3b52;
      box-shadow: var(--shadow);
    }
    .toast.show { display: block; }
    @keyframes heartbeat {
      0%, 100% { transform: rotate(-45deg) scale(1); }
      30% { transform: rotate(-45deg) scale(1.03) translateY(-3px); }
      60% { transform: rotate(-45deg) scale(0.98) translateY(2px); }
    }
    @keyframes heartbeat-strong {
      0% { transform: rotate(-45deg) scale(1); }
      25% { transform: rotate(-45deg) scale(1.08) translateY(-6px); }
      50% { transform: rotate(-45deg) scale(0.95); }
      75% { transform: rotate(-45deg) scale(1.06); }
      100% { transform: rotate(-45deg) scale(1); }
    }
    @keyframes jitter {
      0% { transform: rotate(-45deg) translate(0, 0) scale(1.02); }
      50% { transform: rotate(-45deg) translate(-2px, 2px) scale(1.02); }
      100% { transform: rotate(-45deg) translate(2px, -2px) scale(1.02); }
    }
  </style>
</head>
<body>
  <main class=\"shell\">
    <section class=\"hero\">
      <h1>I love you</h1>
      <p>点击爱心，让心跳更靠近。</p>
    </section>

    <section class=\"card heart-wrap\">
      <button class=\"heart-btn\" aria-label=\"爱的心跳\">
        <div class=\"heart\" id=\"heart\"></div>
      </button>
      <div class=\"status\" id=\"status\">轻轻跳动中…</div>
    </section>

    <section class=\"card\">
      <h3>我们的日历</h3>
      <div class=\"calendar\" id=\"calendar\"></div>
    </section>

    <section class=\"card\">
      <h3>写下想说的话</h3>
      <form id=\"loveForm\">
        <input type=\"text\" id=\"name\" placeholder=\"你的名字\" />
        <textarea id=\"message\" placeholder=\"想说的话…\"></textarea>
        <button type=\"submit\" class=\"btn\">发送心意</button>
      </form>
      <div class=\"toast\" id=\"toast\"></div>
    </section>
  </main>

  <script>
    // 简单心跳逻辑：点击时加速跳动，再恢复柔和动画
    const heart = document.getElementById('heart');
    const statusText = document.getElementById('status');

    const triggerPulse = () => {
      heart.classList.add('active');
      statusText.textContent = '心跳加速，想你更近…';
      setTimeout(() => {
        heart.classList.remove('active');
        statusText.textContent = '轻轻跳动中…';
      }, 1200);
    };

    heart.addEventListener('click', triggerPulse);

    // 绘制一个 4x7 的日期网格，边框分隔每个格子
    const calendar = document.getElementById('calendar');
    const days = Array.from({ length: 28 }, (_, i) => i + 1);
    const specialDays = [1, 7, 14, 21, 28]; // 特别标记的日子
    days.forEach(day => {
      const cell = document.createElement('div');
      cell.className = 'day' + (specialDays.includes(day) ? ' special' : '');
      cell.textContent = day;
      calendar.appendChild(cell);
    });

    // 留言表单：展示简洁的 toast
    const form = document.getElementById('loveForm');
    const toast = document.getElementById('toast');

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const name = (document.getElementById('name').value || '亲爱的').trim();
      const msg = (document.getElementById('message').value || '我爱你').trim();
      toast.textContent = ${name} 想说：;
      toast.classList.add('show');
      triggerPulse();
    });
  </script>
</body>
</html>
